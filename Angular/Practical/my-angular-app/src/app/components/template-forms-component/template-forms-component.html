<h1>template-forms-component works!</h1>

<div>
    <input type="text" 
    [(ngModel)]="myColor"
    name="color"
    required
    minlength="3"
    #color="ngModel"
    placeholder="Enter Color">
</div>

<div>
    <div *ngIf="color.errors?.['required']">
        Color is Required
    </div>
    <div *ngIf="color.errors?.['minlength']">
        Minimum Length must be 3
    </div>
</div>

<div [ngStyle]="{'color': myColor}">
    <p>This Text will change color</p>
</div>
